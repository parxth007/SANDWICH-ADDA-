<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandwich Adda – Bread & Beyond</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --gold-dim: #8A6F35;
    --black: #080808;
    --dark: #0F0F0F;
    --charcoal: #1A1A1A;
    --card: #111111;
    --text: #F0E6CC;
    --text-dim: #9A8A6A;
  }

  html, body {
    height: 100%;
    background: var(--black);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    overflow-x: hidden;
  }

  /* ── Animated golden grain overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
    opacity: .4;
  }

  /* ── Radial ambient glow ── */
  body::after {
    content: '';
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 80vw;
    height: 80vw;
    background: radial-gradient(ellipse, rgba(201,168,76,.08) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 60px;
  }

  /* ── TOP DECORATIVE BORDER ── */
  .top-border {
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: .7; }
    50% { opacity: 1; }
  }

  /* ── HERO SECTION ── */
  .hero {
    width: 100%;
    max-width: 480px;
    padding: 48px 28px 36px;
    text-align: center;
    position: relative;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 1.5px solid var(--gold);
    background: radial-gradient(circle, #1E1A0F 0%, #0C0C0C 100%);
    margin-bottom: 24px;
    position: relative;
    box-shadow: 0 0 30px rgba(201,168,76,.2), inset 0 0 20px rgba(201,168,76,.05);
    animation: pulse-glow 4s ease-in-out infinite;
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 30px rgba(201,168,76,.2), inset 0 0 20px rgba(201,168,76,.05); }
    50% { box-shadow: 0 0 50px rgba(201,168,76,.35), inset 0 0 20px rgba(201,168,76,.1); }
  }

  .logo-badge svg {
    width: 44px;
    height: 44px;
    fill: var(--gold);
    opacity: .9;
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 2.6rem;
    font-weight: 900;
    letter-spacing: 0.04em;
    line-height: 1.1;
    background: linear-gradient(135deg, #C9A84C 0%, #F0D87A 45%, #C9A84C 75%, #8A6F35 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fade-down .8s ease both;
  }

  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--gold-dim);
    letter-spacing: 0.18em;
    margin-top: 6px;
    margin-bottom: 28px;
    animation: fade-down .9s ease .1s both;
  }

  /* thin golden rule */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 auto 28px;
    width: 80%;
    animation: fade-down 1s ease .2s both;
  }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dim)); }
  .divider-line.right { background: linear-gradient(90deg, var(--gold-dim), transparent); }
  .divider-diamond {
    width: 6px; height: 6px;
    background: var(--gold);
    transform: rotate(45deg);
    flex-shrink: 0;
  }

  /* ── INFO CARD ── */
  .info-card {
    background: var(--card);
    border: 1px solid rgba(201,168,76,.2);
    border-radius: 12px;
    padding: 22px 24px;
    width: 100%;
    max-width: 440px;
    margin: 0 auto 40px;
    position: relative;
    overflow: hidden;
    animation: fade-up 1s ease .3s both;
  }

  .info-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .info-row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 10px 0;
    border-bottom: 1px solid rgba(201,168,76,.08);
  }
  .info-row:last-child { border-bottom: none; }

  .info-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: rgba(201,168,76,.08);
    border: 1px solid rgba(201,168,76,.15);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .info-icon svg { width: 16px; height: 16px; stroke: var(--gold); fill: none; stroke-width: 1.8; }

  .info-label {
    font-size: .65rem;
    font-weight: 600;
    letter-spacing: .14em;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .info-value {
    font-size: .85rem;
    color: var(--text);
    font-weight: 300;
    line-height: 1.5;
  }

  /* ── FOOD GRAPHICS STRIP ── */
  .food-strip {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 40px;
    animation: fade-up 1s ease .4s both;
    font-size: 1.9rem;
    letter-spacing: .05em;
    filter: drop-shadow(0 0 8px rgba(201,168,76,.4));
  }

  /* ── ACTION BUTTONS ── */
  .buttons-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    width: 100%;
    max-width: 440px;
    padding: 0 24px;
    animation: fade-up 1s ease .5s both;
  }

  .btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 20px 12px;
    border-radius: 12px;
    text-decoration: none;
    font-family: 'Montserrat', sans-serif;
    font-size: .72rem;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
    position: relative;
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.06) 0%, transparent 60%);
    pointer-events: none;
  }

  .btn:hover { transform: translateY(-3px); }
  .btn:active { transform: translateY(0); }

  .btn svg { width: 26px; height: 26px; }

  /* Menu */
  .btn-menu {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, #1A1400 0%, #2A2000 50%, #1A1400 100%);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    box-shadow: 0 4px 24px rgba(201,168,76,.2), inset 0 1px 0 rgba(201,168,76,.15);
    flex-direction: row;
    gap: 14px;
    padding: 22px 28px;
    font-size: .8rem;
  }
  .btn-menu:hover { box-shadow: 0 8px 36px rgba(201,168,76,.35), inset 0 1px 0 rgba(201,168,76,.25); }
  .btn-menu svg { stroke: var(--gold); fill: none; stroke-width: 1.8; width: 22px; height: 22px; }

  /* Location */
  .btn-location {
    background: var(--charcoal);
    border: 1px solid rgba(201,168,76,.25);
    color: var(--text);
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
  }
  .btn-location:hover { border-color: var(--gold); box-shadow: 0 6px 24px rgba(201,168,76,.15); }
  .btn-location svg { stroke: var(--gold); fill: none; stroke-width: 1.8; }

  /* Call */
  .btn-call {
    background: var(--charcoal);
    border: 1px solid rgba(201,168,76,.25);
    color: var(--text);
    box-shadow: 0 4px 16px rgba(0,0,0,.4);
  }
  .btn-call:hover { border-color: var(--gold); box-shadow: 0 6px 24px rgba(201,168,76,.15); }
  .btn-call svg { stroke: var(--gold); fill: none; stroke-width: 1.8; }

  /* WhatsApp */
  .btn-whatsapp {
    grid-column: 1 / -1;
    background: linear-gradient(135deg, #0A1A0D 0%, #0D200F 50%, #0A1A0D 100%);
    border: 1px solid rgba(37,211,102,.35);
    color: #7FE8A0;
    box-shadow: 0 4px 20px rgba(37,211,102,.1);
    flex-direction: row;
    gap: 14px;
    padding: 20px 28px;
    font-size: .78rem;
  }
  .btn-whatsapp:hover { box-shadow: 0 6px 30px rgba(37,211,102,.2); border-color: rgba(37,211,102,.6); }
  .btn-whatsapp svg { fill: #25D366; width: 24px; height: 24px; }

  /* ── BOTTOM ORNAMENT ── */
  .bottom-ornament {
    margin-top: 48px;
    text-align: center;
    animation: fade-up 1s ease .7s both;
  }
  .bottom-ornament .ornament-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: .8rem;
    color: var(--text-dim);
    letter-spacing: .1em;
  }

  .bottom-border {
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), var(--gold), transparent);
    margin-top: auto;
    animation: shimmer 3s ease-in-out infinite;
    position: fixed;
    bottom: 0;
  }

  @keyframes fade-down {
    from { opacity: 0; transform: translateY(-18px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(18px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="top-border"></div>

  <div class="bottom-ornament">

</div>
